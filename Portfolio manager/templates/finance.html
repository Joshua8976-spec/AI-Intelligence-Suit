<!DOCTYPE html>
<html>
<head>
    <title>AI Portfolio Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 40px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .stat-box { text-align: center; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .cash-color { background: #27ae60; }
        .worth-color { background: #2980b9; }
        input { padding: 8px; border-radius: 5px; border: none; margin-bottom: 10px; width: 80%; }
        button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; width: 85%; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; color: #ddd; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        th { color: #8e44ad; }
    </style>
</head>
<body>

    <h1>🚀 AI Portfolio Manager</h1>

    <div class="dashboard-grid">
        <div class="card">
            <div class="stat-box cash-color">
                <h3>💵 Available Cash</h3>
                <h2>${{ "%.2f"|format(cash) }}</h2>
            </div>
            <div class="stat-box worth-color">
                <h3>📈 Total Net Worth</h3>
                <h2>${{ "%.2f"|format(net_worth) }}</h2>
            </div>
        </div>

        <div class="card">
            <h3>Quick Actions</h3>
            <form action="/deposit" method="POST">
                <input type="number" step="0.01" name="amount" placeholder="Deposit Cash ($)" required>
                <button type="submit" style="background: #27ae60; color: white;">Deposit Funds</button>
            </form>
            <hr style="border: 0.5px solid #333; margin: 15px 0;">
            <form action="/buy" method="POST">
                <input type="text" name="ticker" placeholder="Ticker (e.g. BTC-USD)" required>
                <input type="number" step="0.01" name="shares" placeholder="Shares" required>
                <button type="submit" style="background: #2980b9; color: white;">Execute Buy</button>
            </form>
        </div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h3>Asset Allocation</h3>
        <div id="chart-container">
            {{ graph | safe }}
        </div>
    </div>

    <div class="card">
        <h3>Holdings Breakdown</h3>
        {{ tables[0] | safe }}
    </div>

</body>
</html>
